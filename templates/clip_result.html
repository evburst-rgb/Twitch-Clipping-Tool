<!DOCTYPE html>
<html>
<head>
    <title>Clip Created | EvBurst Clipping Tool</title>
    <link rel="icon" type="image/png" href="/static/evburst_clipping_tool.png">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(0, 207, 255, 0.28), transparent 35%),
                radial-gradient(circle at bottom right, rgba(184, 77, 255, 0.28), transparent 35%),
                linear-gradient(135deg, #03040c, #08091c 45%, #050612);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 540px;
            max-width: 92%;
            background: rgba(8, 10, 28, 0.94);
            border: 1px solid rgba(0, 207, 255, 0.5);
            border-radius: 26px;
            box-shadow:
                0 0 35px rgba(0, 207, 255, 0.28),
                0 0 75px rgba(184, 77, 255, 0.20);
            padding: 38px;
            text-align: center;
        }

        .logo {
            font-size: 38px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #00cfff, #ffffff, #b84dff);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .title {
            font-size: 15px;
            letter-spacing: 5px;
            color: #c9d8ff;
            margin-bottom: 26px;
        }

        .status {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 18px;
            letter-spacing: 1px;
            background: rgba(0, 255, 140, 0.15);
            border: 1px solid rgba(0, 255, 140, 0.7);
            color: #7dffbf;
        }

        .subtext {
            color: #b9c4d8;
            line-height: 1.6;
            font-size: 15px;
            margin-bottom: 26px;
        }

        .main-button {
            display: inline-block;
            text-decoration: none;
            color: #03101a;
            font-weight: 900;
            background: linear-gradient(90deg, #00cfff, #b84dff);
            padding: 16px 28px;
            border-radius: 15px;
            box-shadow: 0 0 22px rgba(0, 207, 255, 0.48);
            margin: 8px;
        }

        .secondary-link {
            display: inline-block;
            margin-top: 16px;
            color: #9fb7d8;
            text-decoration: none;
            font-size: 14px;
        }

        .secondary-link:hover {
            color: #00cfff;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">EVBURST</div>
        <div class="title">CLIP CREATED</div>

        <div class="status">SUCCESS</div>

        <p class="subtext">
            Your Twitch clip was created successfully.
        </p>

        <a href="{{ clip_url }}" target="_blank" class="main-button">
            View Clip
        </a>

        <br>

        <a href="/" class="secondary-link">
            Back to Home
        </a>
    </div>
</body>
</html>
